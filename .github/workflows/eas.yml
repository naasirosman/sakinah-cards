name: EAS

on:
  push:
    branches:
      - '**'       # OTA update on every branch push
    tags:
      - 'v*'       # Full build + submit on version tags (e.g. v1.1.0)
    paths-ignore:
      - '.github/workflows/**'

jobs:
  # ── OTA update (JS-only, instant, no App Store review) ───────────────────
  update:
    name: OTA Update
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          # Use branch name as EAS channel (main → production, others → their own channel)
          BRANCH="${GITHUB_REF_NAME}"
          if [ "$BRANCH" = "main" ]; then
            CHANNEL="production"
          else
            CHANNEL="$BRANCH"
          fi
          eas update \
            --branch "$CHANNEL" \
            --environment production \
            --message "$COMMIT_MESSAGE" \
            --non-interactive

  # ── Full native build + TestFlight submit (triggered by version tag) ──────
  build:
    name: Build & Submit to TestFlight
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS & submit to TestFlight
        run: |
          eas build \
            --platform ios \
            --profile production \
            --auto-submit \
            --non-interactive
