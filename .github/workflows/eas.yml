name: EAS

on:
  push:
    branches:
      - '**'       # OTA update on every branch push
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:   # Manual trigger for Build & Submit to TestFlight

jobs:
  # ── OTA update (JS-only, instant, no App Store review) ───────────────────
  update:
    name: OTA Update
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        run: |
          eas update \
            --branch "production" \
            --environment production \
            --message "App update" \
            --non-interactive

  # ── Full native build + TestFlight submit (triggered manually) ───────────
  build:
    name: Build & Submit to TestFlight
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS & submit to TestFlight
        run: |
          eas build \
            --platform ios \
            --profile production \
            --auto-submit \
            --non-interactive
