name: EAS Build & Submit to TestFlight

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
      submit:
        description: 'Submit to TestFlight after build?'
        required: true
        default: true
        type: boolean

jobs:
  build-and-submit:
    name: Build iOS & Submit to TestFlight
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS with EAS
        id: build
        run: |
          eas build \
            --platform ios \
            --profile ${{ inputs.profile }} \
            --non-interactive \
            --json \
            --output build-output.json
          echo "build_id=$(jq -r '.id' build-output.json)" >> $GITHUB_OUTPUT
          echo "artifact_url=$(jq -r '.artifacts.buildUrl' build-output.json)" >> $GITHUB_OUTPUT

      - name: Submit to TestFlight
        if: ${{ inputs.submit == true }}
        run: |
          eas submit \
            --platform ios \
            --profile ${{ inputs.profile }} \
            --id ${{ steps.build.outputs.build_id }} \
            --non-interactive
        env:
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
          EXPO_ASC_API_KEY_ID: ${{ secrets.EXPO_ASC_API_KEY_ID }}
          EXPO_ASC_API_KEY_ISSUER_ID: ${{ secrets.EXPO_ASC_API_KEY_ISSUER_ID }}
          EXPO_ASC_API_KEY: ${{ secrets.EXPO_ASC_API_KEY }}

      - name: Summary
        run: |
          echo "## Build Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Profile | \`${{ inputs.profile }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build ID | \`${{ steps.build.outputs.build_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | [Download](${{ steps.build.outputs.artifact_url }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Submitted to TestFlight | ${{ inputs.submit }} |" >> $GITHUB_STEP_SUMMARY
